model:
  backbone: efficientnet_b0
  secondary_backbone: resnet50
  num_classes: 5
  dropout: 0.3
  img_size: 160  # CPU Optimized
  weights_path: model/efficientnet_b0_dr.pth
  secondary_weights_path: model/resnet50_dr.pth

training:
  epochs: 15
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 0.01
  patience: 5
  min_delta: 0.001
  seed: 42
  val_split: 0.2

scheduler:
  type: CosineAnnealingWarmRestarts
  T_0: 5
  T_mult: 2
  eta_min: 0.000001

data:
  data_dir: data
  train_csv: train.csv
  img_dir: train_images
  num_workers: 0  # Stability for Windows/CPU

tta:
  enabled: true
  n_augmentations: 5

lime:
  num_samples: 300
  num_features: 10

shap:
  num_samples: 50

calibration:
  temperature_path: model/temperature.pt

quality:
  blur_threshold: 50.0
  min_brightness: 20
  max_brightness: 230
  min_resolution: 224
